<!DOCTYPE html>
<html>
<head>
    <title>Community Profile Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 25px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            color: #0079c1;
        }

        input {
            padding: 10px;
            width: 200px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #0079c1;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #005a8c;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
