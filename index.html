<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Community Profile Finder</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    margin-top:0;
    color:#0079c1;
}

p{
    color:#555;
}

input{
    width:220px;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    background:#0079c1;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:4px;
    cursor:pointer;
    margin-left:8px;
}

button:hover{
    background:#005e95;
}

#result{
    margin-top:20px;
    font-size:18px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <h2>Find Your Community Profile</h2>

    <p>
        Enter your ZIP code to go directly to the matching profile.
    </p>

    <input
        id="zip"
        type="text"
        placeholder="Enter ZIP Code"
        maxlength="5">

    <button onclick="lookupCommunity()">
        View Profile
    </button>

    <div id="result"></div>

</div>

<script>

const zipLookup = {

    // Matthews

    "28104":
    "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2#ref-n-zUF5U0",

    "28105":
    "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2#ref-n-zUF5U0",

    // Indian Trail

    "28079":
    "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2#ref-n-gSqDae",

    // Monroe

    "28110":
    "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2#ref-n-dh5C0l",

    "28112":
    "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2#ref-n-dh5C0l"

};

function lookupCommunity(){

    const zip =
        document.getElementById("zip")
        .value
        .trim();

    const target =
        zipLookup[zip];

    const result =
        document.getElementById("result");

    if(!target){

        result.innerHTML =
            '<div class="error">ZIP code not found.</div>';

        return;
    }

    result.innerHTML =
        '<div class="success">Opening profile...</div>';

    window.top.location.href = target;
}

document
.getElementById("zip")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        lookupCommunity();
    }

});

</script>

</body>
</html>
