<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPU Finder</title>

<style>
/* Fullscreen setup */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Avenir Next W01", "Avenir Next W00", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
    background-color: #ffffff;
}

/* The Instant App container takes up 100% of the screen */
.map-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Floating interaction widget over the live map */
.search-widget {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    background: #ffffff;
    padding: 20px;
    border-radius: 4px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    border-top: 4px solid #0079c1; /* Esri Blue accent bar */
    max-width: 300px;
    width: 85%;
}

.search-widget h2 {
    margin: 0 0 6px 0;
    font-size: 16px;
    font-weight: 700;
    color: #151515;
}

.search-widget p {
    margin: 0 0 14px 0;
    font-size: 13px;
    color: #595959;
    line-height: 1.4;
}

.search-box {
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #b9b9b9;
    border-radius: 2px;
    outline: none;
    text-transform: uppercase; /* Keeps user input visually uniform */
}

input:focus {
    border-color: #0079c1;
}

button {
    background-color: #0079c1;
    color: #ffffff;
    border: none;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
}

button:hover {
    background-color: #005e95;
}

#error-msg {
    color: #a91616;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 600;
}
</style>
</head>
<body>

<!-- Embedded ArcGIS Instant App Lookup template -->
<div class="map-container">
    <iframe id="instantAppFrame" src="https://government-admin.maps.arcgis.com/apps/instant/lookup/index.html?appid=5c57119c997b41f89af399fa2b88daa2"></iframe>
</div>

<!-- Floating UI widget -->
<div class="search-widget">
    <h2>Find Your NPU</h2>
    <p>Already know your NPU? Select or type it below. Otherwise, use the map to locate yours.</p>
    <div class="search-box">
        <!-- Added list attribute linking to the datalist below -->
        <input id="npuInput" type="text" placeholder="e.g., A, B, C..." maxlength="10" list="npu-list">
        <button onclick="lookupNPU()">Go</button>
    </div>
    
    <!-- Pre-populated NPU quick list for rapid selection -->
    <datalist id="npu-list">
        <option value="A"></option><option value="B"></option><option value="C"></option>
        <option value="D"></option><option value="E"></option><option value="F"></option>
        <option value="G"></option><option value="H"></option><option value="I"></option>
        <option value="J"></option><option value="K"></option><option value="L"></option>
        <option value="M"></option><option value="N"></option><option value="O"></option>
        <option value="P"></option><option value="Q"></option><option value="R"></option>
        <option value="S"></option><option value="T"></option><option value="V"></option>
        <option value="W"></option><option value="X"></option><option value="Y"></option>
        <option value="Z"></option>
    </datalist>

    <div id="error-msg"></div>
</div>

<script>
const baseUrl = "https://government-admin.maps.arcgis.com/apps/instant/lookup/index.html?appid=5c57119c997b41f89af399fa2b88daa2";

function lookupNPU(){
    let inputVal = document.getElementById("npuInput").value.trim().toUpperCase();
    const errorMsg = document.getElementById("error-msg");
    const frame = document.getElementById("instantAppFrame");

    if(!inputVal){
        if(errorMsg) errorMsg.innerText = "Please enter or select an NPU.";
        return;
    }

    if(errorMsg) errorMsg.innerText = ''; 

    // Converts "A" or "NPU A" safely to the search string "NPU A"
    if (!inputVal.startsWith("NPU ")) {
        inputVal = "NPU " + inputVal;
    }

    // Passes the explicit search target directly to the ArcGIS Instant App API
    frame.src = `${baseUrl}&find=${encodeURIComponent(inputVal)}`;
}

// Bind Enter key to search submission
document.addEventListener("DOMContentLoaded", () => {
    const npuInput = document.getElementById("npuInput");
    if(npuInput) {
        npuInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter"){ lookupNPU(); }
        });
    }
});
</script>

</body>
</html>
