<!DOCTYPE html>
<html>
<head>
    <title>Community Profile Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 25px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            color: #0079c1;
        }

        input {
            padding: 10px;
            width: 200px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #0079c1;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #005a8c;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h2>Find Your Community Profile</h2>

    <p>Enter a ZIP Code</p>

    <input
        type="text"
        id="zip"
        placeholder="28105"
        maxlength="5">

    <button onclick="lookup()">
        View Profile
    </button>

    <div id="result"></div>

    <script>

        const zipLookup = {

            "28104": "Matthews",
            "28105": "Matthews",

            "28079": "Indian Trail",

            "28110": "Monroe",
            "28112": "Monroe"

            // Add more communities here later
            // "28173": "Waxhaw",
            // "28174": "Wingate",
            // "28103": "Marshville"

        };

        function lookup() {

            const zip =
                document.getElementById("zip")
                .value
                .trim();

            const result =
                document.getElementById("result");

            const community =
                zipLookup[zip];

            if (community) {

                result.className = "success";

                result.innerHTML =
                    "✅ " +
                    community +
                    ", NC";

            }
            else {

                result.className = "error";

                result.innerHTML =
                    "❌ ZIP code not found";

            }
        }

    </script>

</body>
</html>
