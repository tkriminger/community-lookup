<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Profile Finder</title>

<style>
/* Base page shell setup */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Avenir Next W01", "Avenir Next W00", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background-color: #ffffff;
    color: #2c2c2c;
    overflow: hidden;
}

/* VIEW 1: Clean lookup screen styled like an ArcGIS landing page element */
.search-view {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
    background-color: #f3f3f3;
}

.container {
    max-width: 520px;
    width: 90%;
    background: #ffffff;
    padding: 40px 35px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    text-align: center;
    border-top: 5px solid #0079c1; /* Esri Brand Blue Accent Bar */
}

h2 {
    margin-top: 0;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #151515;
    margin-bottom: 12px;
}

p {
    font-size: 15px;
    line-height: 1.5;
    color: #595959;
    margin-bottom: 28px;
}

.search-box {
    display: inline-flex;
    justify-content: center;
    width: 100%;
    max-width: 380px;
    gap: 10px;
    margin: 0 auto;
}

input {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid #b9b9b9;
    border-radius: 2px;
    outline: none;
    color: #2c2c2c;
    transition: border-color 0.2s;
}

input:focus {
    border-color: #0079c1;
}

.primary-btn {
    background-color: #0079c1;
    color: #ffffff;
    border: none;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    transition: background-color 0.2s;
    white-space: nowrap;
}

.primary-btn:hover {
    background-color: #005e95;
}

#result {
    margin-top: 20px;
    font-size: 15px;
}

.error {
    color: #a91616;
    font-weight: 600;
}

/* VIEW 2: Clean Header layout with only your single change action requirement */
.profile-view {
    display: none; 
    flex-direction: column;
    width: 100%;
    height: 100%;
    background-color: #ffffff;
}

.context-header {
    background-color: #ffffff;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #e0e0e0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    z-index: 9999;
}

.brand-title-group h3 {
    margin: 0;
    color: #151515;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

/* Exact dark green button background from your layout specification */
.app-btn {
    background-color: #006837; 
    color: #ffffff;
    border: none;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.15s ease-in-out;
}

.app-btn:hover {
    background-color: #004d28;
}

/* The full viewport container hosting the StoryMap iframe content safely */
.iframe-container {
    flex-grow: 1;
    width: 100%;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
</head>
<body>

<div id="searchView" class="search-view">
    <div class="container">
        <h2>Find Your Community Profile</h2>
        <p>Enter your ZIP code to go directly to the matching profile.</p>
        <div class="search-box">
            <input id="zip" type="text" placeholder="Enter ZIP Code" maxlength="5">
            <button class="primary-btn" onclick="lookupCommunity()">View Profile</button>
        </div>
        <div id="result"></div>
    </div>
</div>

<div id="profileView" class="profile-view">
    <div class="context-header">
        <div class="brand-title-group">
            <h3>Community Profile Viewer</h3>
        </div>
        <button class="app-btn" onclick="clearZipCode()">Change zip code</button>
    </div>
    
    <div id="iframeStage" class="iframe-container"></div>
</div>

<script>
// Dictionary connecting your neighborhood ZIP keys straight to the embedded story hashes/sections
const zipLookup = {
    "28104": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-zUF5U0",
    "28105": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-zUF5U0",
    "28079": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-gSqDae",
    "28110": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-dh5C0l",
    "28112": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-dh5C0l"
};

function lookupCommunity(){
    const zipInput = document.getElementById("zip").value.trim();
    const targetUrl = zipLookup[zipInput];
    const result = document.getElementById("result");

    if(!targetUrl){
        if(result) {
            result.innerHTML = '<div class="error">ZIP code not found.</div>';
        }
        return;
    }

    if(result) result.innerHTML = ''; 

    // Inject the target StoryMap section URL straight into the clean view viewport
    const stage = document.getElementById("iframeStage");
    stage.innerHTML = `<iframe src="${targetUrl}"></iframe>`;

    // Swap layout visibility states instantly
    document.getElementById("searchView").style.display = "none";
    document.getElementById("profileView").style.display = "flex";
}

function clearZipCode() {
    // Clear out active document frame content 
    document.getElementById("iframeStage").innerHTML = "";
    // Toggle layouts back to initial entry look-up screen
    document.getElementById("profileView").style.display = "none";
    document.getElementById("searchView").style.display = "flex";
    document.getElementById("zip").value = "";
}

// Bind the Enter key functionality inside the search box input element
document.addEventListener("DOMContentLoaded", () => {
    const zipInput = document.getElementById("zip");
    if(zipInput) {
        zipInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter"){ lookupCommunity(); }
        });
    }
});
</script>

</body>
</html>
