<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Profile Finder</title>

<style>
/* Reset page to allow full-bleed fullscreen elements */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Avenir Next W01", "Avenir Next W00", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background-color: #ffffff;
    color: #2c2c2c;
    overflow: hidden;
}

/* Clear, centered search card matching Esri brand styling */
.search-view {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
    background-color: #f3f3f3;
}

.container {
    max-width: 460px;
    width: 90%;
    background: #ffffff;
    padding: 40px 35px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    text-align: center;
    border-top: 5px solid #0079c1; /* Esri Blue Bar */
}

h2 {
    margin-top: 0;
    font-size: 24px;
    font-weight: 700;
    color: #151515;
    margin-bottom: 12px;
}

p {
    font-size: 14px;
    line-height: 1.5;
    color: #595959;
    margin-bottom: 24px;
}

.search-box {
    display: flex;
    gap: 10px;
    width: 100%;
}

input {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid #b9b9b9;
    border-radius: 2px;
    outline: none;
}

input:focus {
    border-color: #0079c1;
}

button {
    background-color: #0079c1;
    color: #ffffff;
    border: none;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
}

button:hover {
    background-color: #005e95;
}

#error-msg {
    color: #a91616;
    margin-top: 15px;
    font-size: 14px;
    font-weight: 600;
}

/* Fullscreen container for the StoryMap with absolutely no wrapper junk */
.storymap-view {
    display: none; 
    width: 100%;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
</head>
<body>

<!-- Step 1: Clean landing search container -->
<div id="searchView" class="search-view">
    <div class="container">
        <h2>Find Your Community Profile</h2>
        <p>Enter your ZIP code to explore housing affordability metrics within your target neighborhood block.</p>
        <div class="search-box">
            <input id="zip" type="text" placeholder="Enter ZIP Code" maxlength="5">
            <button onclick="lookupCommunity()">View Profile</button>
        </div>
        <div id="error-msg"></div>
    </div>
</div>

<!-- Step 2: Uncluttered StoryMap stage -->
<div id="storymapView" class="storymap-view">
    <div id="iframeStage" style="width: 100%; height: 100%;"></div>
</div>

<script>
// Dictionary connecting your neighborhood ZIP keys directly to the embedded story section hashes
const zipLookup = {
    "28104": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-zUF5U0",
    "28105": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-zUF5U0",
    "28079": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-gSqDae",
    "28110": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-dh5C0l",
    "28112": "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed#ref-n-dh5C0l"
};

function lookupCommunity(){
    const zipInput = document.getElementById("zip").value.trim();
    const targetUrl = zipLookup[zipInput];
    const errorMsg = document.getElementById("error-msg");

    if(!targetUrl){
        if(errorMsg) {
            errorMsg.innerText = "ZIP code not found.";
        }
        return;
    }

    if(errorMsg) errorMsg.innerText = ''; 

    // Inject the target StoryMap iframe directly at 100% height and width
    document.getElementById("iframeStage").innerHTML = `<iframe src="${targetUrl}"></iframe>`;

    // Swap layout visibility states instantly (Hiding search screen completely)
    document.getElementById("searchView").style.display = "none";
    document.getElementById("storymapView").style.display = "block";
}

// Bind the Enter key functionality inside the search box input element
document.addEventListener("DOMContentLoaded", () => {
    const zipInput = document.getElementById("zip");
    if(zipInput) {
        zipInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter"){ lookupCommunity(); }
        });
    }
});
</script>

</body>
</html>
