<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Profile Finder</title>

<style>
/* Fullscreen setup */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Avenir Next W01", "Avenir Next W00", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
    background-color: #ffffff;
}

/* The StoryMap container takes up 100% of the screen right away */
.map-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Elegant floating search widget styled like an official ArcGIS map tool */
.search-widget {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    background: #ffffff;
    padding: 20px;
    border-radius: 4px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    border-top: 4px solid #0079c1; /* Esri Blue accent bar */
    max-width: 300px;
    width: 85%;
}

.search-widget h2 {
    margin: 0 0 6px 0;
    font-size: 16px;
    font-weight: 700;
    color: #151515;
}

.search-widget p {
    margin: 0 0 14px 0;
    font-size: 13px;
    color: #595959;
    line-height: 1.4;
}

.search-box {
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #b9b9b9;
    border-radius: 2px;
    outline: none;
}

input:focus {
    border-color: #0079c1;
}

button {
    background-color: #0079c1;
    color: #ffffff;
    border: none;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
}

button:hover {
    background-color: #005e95;
}

#error-msg {
    color: #a91616;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 600;
}
</style>
</head>
<body>

<!-- The Focus StoryMap framework, active immediately on page load -->
<div class="map-container">
    <iframe id="storymapFrame" src="https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed"></iframe>
</div>

<!-- Floating interaction widget over the live map framework -->
<div class="search-widget">
    <h2>Find Your Profile</h2>
    <p>Enter your ZIP code to jump directly to your neighborhood metrics.</p>
    <div class="search-box">
        <input id="zip" type="text" placeholder="Enter ZIP Code" maxlength="5">
        <button onclick="lookupCommunity()">Go</button>
    </div>
    <div id="error-msg"></div>
</div>

<script>
function lookupCommunity(){
    const zipInput = document.getElementById("zip").value.trim();
    const errorMsg = document.getElementById("error-msg");
    const frame = document.getElementById("storymapFrame");

    // 1. Validate that the input is a proper 5-digit number
    if (!zipInput || zipInput.length !== 5 || isNaN(zipInput)) {
        if (errorMsg) {
            errorMsg.innerText = "Please enter a valid 5-digit ZIP code.";
        }
        return;
    }

    if (errorMsg) errorMsg.innerText = ''; 

    // 2. Base URL of your focus StoryMap
    const baseStoryUrl = "https://storymaps.arcgis.com/stories/95885c16aa0649d0a1050c363b47a4e2?embed";

    // 3. Dynamic URL query creation using standard Esri StoryMaps framework parameter formatting
    // This injects var_zipcode into the StoryMap, which passes it natively down to your Experience Builder embed component.
    const targetUrl = `${baseStoryUrl}&var_zipcode=${zipInput}`;

    // 4. Update the iframe source to pass the parameter down
    frame.src = targetUrl;
}

// Submits the search automatically if the user presses Enter
document.addEventListener("DOMContentLoaded", () => {
    const zipInput = document.getElementById("zip");
    if(zipInput) {
        zipInput.addEventListener("keypress", (e) => {
            if(e.key === "Enter"){ lookupCommunity(); }
        });
    }
});
</script>

</body>
</html>
